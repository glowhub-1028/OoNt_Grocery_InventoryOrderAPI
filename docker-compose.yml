services:
  postgres:
    image: postgres:15
    container_name: grocery_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: grocery_user
      POSTGRES_PASSWORD: grocery_password
      POSTGRES_DB: grocery_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: grocery_api
    depends_on:
      - postgres
    environment:
      # Prisma / application database URL
      DATABASE_URL: postgres://grocery_user:grocery_password@postgres:5432/grocery_db
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres_data:

